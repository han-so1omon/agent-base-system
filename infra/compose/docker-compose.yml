services:
  app:
    image: busybox:1.36
    profiles: ["app"]
    command: ["sh", "-c", "echo 'placeholder app service for local compose shape' && sleep infinity"]

  neo4j:
    image: neo4j:5
    env_file:
      - neo4j.env
    environment:
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  postgres:
    image: postgres:16
    env_file:
      - postgres.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  neo4j_data:
  postgres_data:
