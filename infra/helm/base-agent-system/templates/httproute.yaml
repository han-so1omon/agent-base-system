{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: base-agent-system
spec:
  parentRefs:
    - name: {{ .Values.gateway.sharedGateway.name }}
      namespace: {{ .Values.gateway.sharedGateway.namespace }}
      sectionName: {{ .Values.gateway.listenerName }}
  hostnames:
    - {{ .Values.gateway.hostname | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: base-agent-system
          port: {{ .Values.service.port }}
{{- end }}
