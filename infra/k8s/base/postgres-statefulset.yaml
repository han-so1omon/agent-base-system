apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-checkpoints
spec:
  serviceName: postgres-checkpoints
  replicas: 1
  selector:
    matchLabels:
      app: postgres-checkpoints
  template:
    metadata:
      labels:
        app: postgres-checkpoints
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: langgraph
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: postgres
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
